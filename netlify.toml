# Netlify configuration
# File này để ở gốc repo, Netlify tự đọc

[build]
  publish = "."        # Serve từ thư mục gốc

# Redirect /admin về admin/index.html
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Cache tối ưu cho assets
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "data.json"
  [headers.values]
    Cache-Control = "public, max-age=60"    # Cache 60 giây
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
